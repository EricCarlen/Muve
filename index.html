<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muve | Join the Muvement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <h1 id="brand-logo">MUVE</h1>
        <span id="greeting"></span>
    </header>
<div class="category-grid">
    <button class="filter-btn" onclick="filterWorkouts('Lower Body')">Lower Body</button>
    <button class="filter-btn" onclick="filterWorkouts('Upper Body')">Upper Body</button>
    <button class="filter-btn" onclick="filterWorkouts('Core A')">Core A</button>
    <button class="filter-btn" onclick="filterWorkouts('Core B')">Core B</button>
    <button class="filter-btn" onclick="filterWorkouts('Body Mobility')">Body Mobility</button>
    <button class="filter-btn" onclick="filterWorkouts('Body Strength')">Body Strength</button>
</div>

<div class="time-grid">
    <button class="filter-btn" onclick="filterWorkouts('morning')">Morning</button>
    <button class="filter-btn" onclick="filterWorkouts('evening')">Evening</button>
    </div>
</div>
    <div id="workout-container" class="workout-grid">

    <script src="script.js"></script>
</body>
</html>
