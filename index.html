<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muve | Join the Muvement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <h1 id="brand-logo">MUVE</h1>
        <span id="greeting"></span>
    </header>
<div class="category-grid">
    <button class="filter-btn" onclick="filterWorkouts('morning')">
        <svg viewBox="0 0 24 24"><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M2 12h2"/><path d="m4.93 19.07 1.41-1.41"/><path d="M12 20v2"/><path d="m17.66 17.66 1.41 1.41"/><path d="M20 12h2"/><path d="m17.66 6.34 1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
        <span>Morning</span>
    </button>

    <button class="filter-btn" onclick="filterWorkouts('upper body')">
        <svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.2 2.2-1.5 3.5-4 3.5-6.8a1 1 0 0 0-1-1 9 9 0 0 0-9 9"/><path d="M11 13c-1-1.5-2.5-2-4.5-2-2 0-3.5.5-4.5 2a4 4 0 0 0 0 4c1 1.5 2.5 2 4.5 2 2 0 3.5-.5 4.5-2a4 4 0 0 0 0-4Z"/><path d="M12 11v2"/></svg>
        <span>Upper Body</span>
    </button>

    <button class="filter-btn" onclick="filterWorkouts('core rotation')">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        <span>Core Rotation</span>
    </button>

    <button class="filter-btn" onclick="filterWorkouts('lower body')">
        <svg viewBox="0 0 24 24"><path d="M2 21h20"/><path d="M6 21V16H10V11H14V6H18V1"/></svg>
        <span>Lower Body</span>
    </button>

    <button class="filter-btn" onclick="filterWorkouts('core control')">
        <svg viewBox="0 0 24 24"><path d="m16 16 3-8 3 8c-.87.67-1.93 1-3 1s-2.13-.33-3-1Z"/><path d="m2 16 3-8 3 8c-.87.67-1.93 1-3 1s-2.13-.33-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>
        <span>Core Control</span>
    </button>

        <button class="filter-btn" onclick="filterWorkouts('strength side')">
        <svg viewBox="0 0 24 24"><path d="m8 3 4 8 5-5 5 15H2L8 3Z"/></svg>
        <span>Strength Side</span>
    </button>

        <button class="filter-btn" onclick="filterWorkouts('mobility Side')">
        <svg viewBox="0 0 24 24"><path d="M12 3c1.5 4 3 4 5 5 1.5 1 2 2 2 4 0 2-1.5 3-3 3-1.5 0-3-1-4-3-1 2-2.5 3-4 3-1.5 0-3-1-3-3 0-2 .5-3 2-4 2-1 3.5-1 5-5Z"/><path d="M12 10V21"/><path d="M12 21c-3-2-6-3-6-6"/><path d="M12 21c3-2 6-3 6-6"/></svg>
        <span>Mobility Side</span>
    </button>

    <button class="filter-btn" onclick="filterWorkouts('evening')">
        <svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <span>Evening</span>
    </button>

</div>

    <div id="workout-overlay" class="overlay">
        <button class="close-btn" onclick="closeWorkout()">&#8592;</button>

        <div id="overlay-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
